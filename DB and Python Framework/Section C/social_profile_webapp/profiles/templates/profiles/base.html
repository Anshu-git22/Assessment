<!DOCTYPE html>
<html lang="en">
<head>
    <title>Social Profile Manager</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #eef2ff 0%, #f8fafc 45%, #ecfeff 100%);
            color: #1e293b;
        }
        .app-navbar {
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.18);
        }
        .brand-badge {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #38bdf8, #6366f1);
            color: #fff;
            margin-right: 10px;
        }
        .nav-link-btn {
            border-radius: 999px;
            padding: 8px 16px;
            font-weight: 500;
        }
        .hero-card {
            border: 0;
            border-radius: 28px;
            background: linear-gradient(135deg, #0f172a, #1d4ed8);
            color: white;
            box-shadow: 0 20px 60px rgba(37, 99, 235, 0.25);
            overflow: hidden;
        }
        .glass-card {
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.88);
            box-shadow: 0 18px 45px rgba(15, 23, 42, 0.08);
        }
        .profile-card {
            border: 0;
            border-radius: 24px;
            background: #ffffff;
            box-shadow: 0 14px 35px rgba(15, 23, 42, 0.08);
            transition: all 0.25s ease;
        }
        .profile-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 22px 45px rgba(15, 23, 42, 0.14);
        }
        .avatar-circle {
            width: 62px;
            height: 62px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #dbeafe, #e0e7ff);
            color: #1d4ed8;
            font-size: 28px;
        }
        .btn-soft-primary {
            background: #eff6ff;
            color: #1d4ed8;
            border: 1px solid #bfdbfe;
        }
        .btn-soft-primary:hover {
            background: #dbeafe;
            color: #1e40af;
        }
        .form-control, .form-check-input {
            border-radius: 14px;
            border-color: #cbd5e1;
        }
        .form-control:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 .2rem rgba(99, 102, 241, .16);
        }
        .footer {
            background: #0f172a;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark app-navbar sticky-top">
    <div class="container py-2">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="{% url 'profile_list' %}">
            <span class="brand-badge"><i class="bi bi-person-bounding-box"></i></span>
            <span>Social Profile Manager</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <div class="ms-auto d-flex flex-column flex-lg-row gap-2 mt-3 mt-lg-0">
                <a href="{% url 'profile_list' %}" class="btn btn-outline-light nav-link-btn"><i class="bi bi-house-door me-1"></i> Dashboard</a>
                <a href="{% url 'create_profile' %}" class="btn btn-info text-white nav-link-btn"><i class="bi bi-plus-circle me-1"></i> Create Profile</a>
                <a href="{% url 'export_profiles' %}" class="btn btn-success nav-link-btn"><i class="bi bi-download me-1"></i> Export CSV</a>
            </div>
        </div>
    </div>
</nav>

<main class="container py-5">
    {% block content %}
    {% endblock %}
</main>

<footer class="footer mt-5">
    <div class="container py-4">
        <div class="row align-items-center gy-3">
            <div class="col-md-6">
                <h5 class="text-white mb-1">Social Profile Manager</h5>
                <p class="mb-0 small">A Django mini project for creating, managing and exporting user profiles.</p>
            </div>
            <div class="col-md-6 text-md-end small">
                <span class="me-3"><i class="bi bi-code-slash me-1"></i>Django Project</span>
                <span>© 2026</span>
            </div>
        </div>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
