{% extends 'profiles/base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="glass-card text-center p-4 p-md-5">
            <div class="mx-auto mb-4 d-flex align-items-center justify-content-center rounded-circle bg-danger-subtle text-danger" style="width: 78px; height: 78px; font-size: 34px;">
                <i class="bi bi-exclamation-triangle"></i>
            </div>
            <h3 class="fw-bold mb-3">Delete Profile?</h3>
            <p class="text-muted fs-5 mb-4">
                Are you sure you want to delete <strong class="text-dark">{{ profile.full_name }}</strong>? This action cannot be undone.
            </p>

            <form method="post" class="d-flex justify-content-center gap-2">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger rounded-pill px-4"><i class="bi bi-trash3 me-1"></i> Yes, Delete</button>
                <a href="{% url 'profile_list' %}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
